<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados ONPE</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* Contenedor que limita el ancho en PCs/TVs pero ocupa el 100% en móviles */
        .contenedor {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-size: 2.5em;
            color: #444;
        }

        .resultado {
            font-size: 5em;
            font-weight: bold;
            color: #004a99;
            margin: 20px 0;
        }

        .detalles {
            margin-top: 30px;
            font-size: 1.8em;
            color: #333;
        }

            .detalles p {
                margin: 10px 0;
            }

        .actualizado {
            margin-top: 40px;
            font-size: 1.2em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>Diferencia de votos al 93.064%</h1>
        <div class="resultado">6,517</div>

        <div class="detalles">
            <p>Juntos por el Perú: <b>1,880,328</b></p>
            <p>Renovación Popular: <b>1,873,811</b></p>
        </div>

        <div class="actualizado">
            <p>Última actualización ONPE: 16/04/2026 17:35:05</p>
        </div>
    </div>
</body>
</html>
