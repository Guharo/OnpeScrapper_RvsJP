<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados ONPE</title>
    <style>
            body {
                font-family: sans-serif;
                text-align: center;
                padding: 20px;
                display: flex;
                justify-content: center;
            }

            /* Contenedor que limita el ancho en PCs/TVs pero ocupa el 100% en móviles */
            .contenedor {
                width: 100%;
                max-width: 800px;
            }

            h1 {
                font-size: 2.5em;
                color: #444;
            }

            .resultado {
                font-size: 5em;
                font-weight: bold;
                color: #004a99;
                margin: 20px 0;
            }

            .detalles {
                margin-top: 30px;
                font-size: 1.8em;
                color: #333;
            }

                .detalles p {
                    margin: 10px 0;
                }

            .actualizado {
                margin-top: 40px;
                font-size: 1.2em;
                color: #666;
            }
            .actualizado a {
                color: #007bff;
                text-decoration: none;
            }
            .actualizado a:hover {
                text-decoration: underline;
                color: #0056b3;
            }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>Diferencia de votos al <span id="porcentaje">93.585</span>%</h1>

        <div class="resultado" id="diferencia">14,050</div>

        <div class="detalles">
            <p>Juntos por el Perú: <b id="votos10">1,894,098</b></p>
            <p>Renovación Popular: <b id="votos35">1,880,048</b></p>
        </div>

        <div class="actualizado">
            <a href="https://resultadoelectoral.onpe.gob.pe/main/resumen" target="_blank" style="text-decoration: none; color: inherit;">
                Última actualización ONPE: <span id="fecha">20/04/2026 12:50:00</span>
            </a>
        </div>
    </div>

    <script>
        function actualizarData() {
            fetch('index.html?t=' + new Date().getTime())
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');

                    const ids = ['porcentaje', 'diferencia', 'votos10', 'votos35', 'fecha'];

                    ids.forEach(id => {
                        const nuevoElemento = doc.getElementById(id);
                        const elementoActual = document.getElementById(id);

                        if (nuevoElemento && elementoActual) {
                            if (elementoActual.innerHTML !== nuevoElemento.innerHTML) {
                                elementoActual.innerHTML = nuevoElemento.innerHTML;
                            }
                        }
                    });
                    console.log('Verificación de actualización completada');
                })
                .catch(err => console.error('Error al actualizar:', err));
        }

        setInterval(actualizarData, 300000);
    </script>
</body>
</html>
